services:
  - type: web
    name: django-app
    env: python
    plan: free # BẮT BUỘC thêm dòng này
    buildCommand: "./build.sh"
    startCommand: "gunicorn mysite.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postgres-db
          property: connectionString

databases:
  - name: postgres-db
    plan: free # BẮT BUỘC thêm dòng này
    databaseName: my_django_db
    user: admin